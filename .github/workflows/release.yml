name: Release Builds

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notes:
    name: Prepare release notes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Extract release notes
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 7

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: pnpm package:mac
            artifact: roller-rumble-macos
          - name: Windows
            # Pinned to 2022: node-gyp 9.x's Visual Studio finder fails to
            # detect the toolchain on the windows-2025 image, breaking the
            # from-source rebuild of @serialport/bindings-cpp.
            os: windows-2022
            command: pnpm package:win
            artifact: roller-rumble-windows
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      # node-gyp 9.x (pulled in transitively by @electron/rebuild) imports
      # distutils, which was removed from the Python stdlib in 3.12. Pin 3.11
      # so native modules (e.g. @serialport/bindings-cpp) rebuild from source.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: ${{ matrix.command }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - notes
      - build
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: release-notes

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: roller-rumble-*
          path: dist
          merge-multiple: true

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Roller Rumble ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes/release-notes.md

      - name: Upload release assets
        shell: bash
        run: |
          find dist -type f -print0 | xargs -0 gh release upload "$GITHUB_REF_NAME" --clobber
